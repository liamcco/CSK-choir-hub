paths:
  security: []
  /auth/login:
    post:
      tags:
        - auth
      summary: Login a user
      operationId: loginUser
      requestBody:
        $ref: '../../docs/openapi.yaml#/components/requestBodies/LoginUser'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '../../docs/openapi.yaml#/components/schemas/User'
        '400':
          $ref: '../../docs/openapi.yaml#/components/responses/ErrorResponse'

  /auth/authenticate:
    security:
      - authCookie: []
    get:
      tags:
        - auth
      summary: Validate session
      operationId: authenticate
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '../../docs/openapi.yaml#/components/schemas/User'
        '401':
          description: Not authenticated
