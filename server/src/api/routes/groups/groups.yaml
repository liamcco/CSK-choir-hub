paths:
  /groups:
    get:
      tags:
        - groups
      summary: List groups
      operationId: getGroups
      parameters:
        - name: type
          in: query
          description: Filter groups by type
          required: false
          schema:
            $ref: '../../docs/openapi.yaml#/components/schemas/GroupType'
      responses:
        '200':
          description: Groups fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: '../../docs/openapi.yaml#/components/schemas/Group'
                required:
                  - groups
    post:
      tags:
        - groups
      summary: Create group
      description: Creates a new group (Admins only).
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../docs/openapi.yaml#/components/schemas/CreateGroupInput'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '../../docs/openapi.yaml#/components/schemas/Group'
                required:
                  - group

  /groups/{groupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        description: ID of the group
        schema:
          type: string
          format: uuid
    put:
      tags:
        - groups
      summary: Update group
      description: Updates a group (Admins only).
      operationId: updateGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../docs/openapi.yaml#/components/schemas/UpdateGroupInput'
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '../../docs/openapi.yaml#/components/schemas/Group'
                required:
                  - group
    delete:
      tags:
        - groups
      summary: Delete group
      description: Deletes a group (Admins only).
      operationId: deleteGroup
      responses:
        '204':
          description: Group deleted

  /groups/{groupId}/users:
    parameters:
      - name: groupId
        in: path
        required: true
        description: ID of the group
        schema:
          type: string
          format: uuid
    post:
      tags:
        - groups
      summary: Add user to group
      description: Adds or reactivates a user membership in the group (Admins only).
      operationId: addUserToGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../docs/openapi.yaml#/components/schemas/AddUserToGroupInput'
      responses:
        '204':
          description: User added to group

  /groups/{groupId}/users/{userId}:
    parameters:
      - name: groupId
        in: path
        required: true
        description: ID of the group
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        description: ID of the user
        schema:
          type: string
    delete:
      tags:
        - groups
      summary: Remove user from group
      description: Ends a user's active membership in the group (Admins only).
      operationId: removeUserFromGroup
      responses:
        '204':
          description: User removed from group

  /groups/{groupId}/children:
    parameters:
      - name: groupId
        in: path
        required: true
        description: ID of the parent group
        schema:
          type: string
          format: uuid
    post:
      tags:
        - groups
      summary: Add child group
      description: Adds a child group to the parent group (Admins only).
      operationId: addGroupChild
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../../docs/openapi.yaml#/components/schemas/AddChildGroupInput'
      responses:
        '204':
          description: Child group added

  /groups/{groupId}/children/{childGroupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        description: ID of the parent group
        schema:
          type: string
          format: uuid
      - name: childGroupId
        in: path
        required: true
        description: ID of the child group
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - groups
      summary: Remove child group
      description: Removes a child group from the parent group (Admins only).
      operationId: removeGroupChild
      responses:
        '204':
          description: Child group removed
