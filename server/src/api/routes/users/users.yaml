paths:
  /users:
    get:
      tags:
        - users
      summary: List users for admin RBAC management
      operationId: getUsers
      parameters:
        - name: search
          in: query
          required: false
          description: Filter users by name, email, or username
          schema:
            type: string
      responses:
        '200':
          description: Users fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '../../docs/openapi.yaml#/components/schemas/AdminUser'
                required:
                  - users
