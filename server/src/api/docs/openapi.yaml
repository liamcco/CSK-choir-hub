    CreatePermissionInput:
      $ref: './components.yaml#/schemas/CreatePermissionInput'
    UpdatePermissionInput:
      $ref: './components.yaml#/schemas/UpdatePermissionInput'
    GrantUserPermissionInput:
      $ref: './components.yaml#/schemas/GrantUserPermissionInput'
    AdminUserGroupMembership:
      $ref: './components.yaml#/schemas/AdminUserGroupMembership'
    AdminUserRoleAssignment:
      $ref: './components.yaml#/schemas/AdminUserRoleAssignment'
    AdminUserPermissionGrant:
      $ref: './components.yaml#/schemas/AdminUserPermissionGrant'
    AdminUser:
      $ref: './components.yaml#/schemas/AdminUser'

    CSKEventType:
      $ref: './components.yaml#/schemas/CSKEventType'
    CSKEventSummary:
      $ref: './components.yaml#/schemas/CSKEventSummary'
    CSKEvent:
      $ref: './components.yaml#/schemas/CSKEvent'
    CreateEventInput:
      $ref: './components.yaml#/schemas/CreateEventInput'
    AttendanceStatus:
      $ref: './components.yaml#/schemas/AttendanceStatus'
    Attendance:
