# CSK Choir Hub API declaration (OpenAPI 3.0.4)
openapi: 3.2.0

info:
  title: CSK Choir Hub
  summary: This is the API declaration for CSK Choir Hub.
  contact:
    name: CSK Webbmästare
    email: webmasters@choir.chs.chalmers.se
  version: 1.0.0

servers:
  - url: http://localhost:5050/api
    description: Local development server
    name: local

security:
  - authCookie: []

paths:
  /books:
    $ref: '../routes/books/books.yaml#/paths/~1books'
  /books/{bookId}:
    $ref: '../routes/books/books.yaml#/paths/~1books~1{bookId}'
  /books/{bookId}/songs:
    $ref: '../routes/books/books.yaml#/paths/~1books~1{bookId}~1songs'
  /books/{bookId}/songs/{songId}:
    $ref: '../routes/books/books.yaml#/paths/~1books~1{bookId}~1songs~1{songId}'

  /events:
    $ref: '../routes/events/events.yaml#/paths/~1events'
  /events/{eventId}:
    $ref: '../routes/events/events.yaml#/paths/~1events~1{eventId}'
  /events/{eventId}/registrations:
    $ref: '../routes/events/events.yaml#/paths/~1events~1{eventId}~1registrations'
  /events/{eventId}/attendances:
    $ref: '../routes/events/events.yaml#/paths/~1events~1{eventId}~1attendances'

  /groups:
    $ref: '../routes/groups/groups.yaml#/paths/~1groups'
  /groups/{groupId}:
    $ref: '../routes/groups/groups.yaml#/paths/~1groups~1{groupId}'
  /groups/{groupId}/users:
    $ref: '../routes/groups/groups.yaml#/paths/~1groups~1{groupId}~1users'
  /groups/{groupId}/users/{userId}:
    $ref: '../routes/groups/groups.yaml#/paths/~1groups~1{groupId}~1users~1{userId}'
  /groups/{groupId}/children:
    $ref: '../routes/groups/groups.yaml#/paths/~1groups~1{groupId}~1children'
  /groups/{groupId}/children/{childGroupId}:
    $ref: '../routes/groups/groups.yaml#/paths/~1groups~1{groupId}~1children~1{childGroupId}'

  /roles:
    $ref: '../routes/roles/roles.yaml#/paths/~1roles'
  /roles/{roleId}:
    $ref: '../routes/roles/roles.yaml#/paths/~1roles~1{roleId}'
  /roles/{roleId}/users:
    $ref: '../routes/roles/roles.yaml#/paths/~1roles~1{roleId}~1users'
  /roles/{roleId}/users/{userId}:
    $ref: '../routes/roles/roles.yaml#/paths/~1roles~1{roleId}~1users~1{userId}'
  /roles/{roleId}/permissions:
    $ref: '../routes/roles/roles.yaml#/paths/~1roles~1{roleId}~1permissions'
  /roles/{roleId}/permissions/{permissionId}:
    $ref: '../routes/roles/roles.yaml#/paths/~1roles~1{roleId}~1permissions~1{permissionId}'

  /permissions:
    $ref: '../routes/permissions/permissions.yaml#/paths/~1permissions'
  /permissions/{permissionId}:
    $ref: '../routes/permissions/permissions.yaml#/paths/~1permissions~1{permissionId}'
  /permissions/{permissionId}/users:
    $ref: '../routes/permissions/permissions.yaml#/paths/~1permissions~1{permissionId}~1users'
  /permissions/{permissionId}/users/{userId}:
    $ref: '../routes/permissions/permissions.yaml#/paths/~1permissions~1{permissionId}~1users~1{userId}'

  /users:
    $ref: '../routes/users/users.yaml#/paths/~1users'

  /songs:
    $ref: '../routes/songs/songs.yaml#/paths/~1songs'
  /songs/{songId}:
    $ref: '../routes/songs/songs.yaml#/paths/~1songs~1{songId}'
  /songs/{songId}/tags:
    $ref: '../routes/songs/songs.yaml#/paths/~1songs~1{songId}~1tags'

  /tags:
    $ref: '../routes/tags/tags.yaml#/paths/~1tags'
  /tags/{tagId}:
    $ref: '../routes/tags/tags.yaml#/paths/~1tags~1{tagId}'

