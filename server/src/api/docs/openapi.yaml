    Group:
      $ref: './components.yaml#/schemas/Group'
    CreateGroupInput:
      $ref: './components.yaml#/schemas/CreateGroupInput'
    UpdateGroupInput:
      $ref: './components.yaml#/schemas/UpdateGroupInput'
    AddUserToGroupInput:
      $ref: './components.yaml#/schemas/AddUserToGroupInput'
    AddChildGroupInput:
      $ref: './components.yaml#/schemas/AddChildGroupInput'
    RoleReference:
      $ref: './components.yaml#/schemas/RoleReference'
    RoleUserAssignment:
      $ref: './components.yaml#/schemas/RoleUserAssignment'
    Role:
