schemas:
  GroupType:
    type: string
    enum: [CHOIR, VOICE, COMMITTEE, BOARD, CONDUCTORS, OTHER]
    example: VOICE

  PermissionEffect:
    type: string
    enum: [ALLOW, DENY]
    example: ALLOW

  UserSummary:
    type: object
    properties:
      id:
        type: string
      name:
        type: string
        example: Liam Cotton
      email:
        type: string
        format: email
      username:
        type: string
        nullable: true
      displayUsername:
        type: string
        nullable: true
      systemRole:
        type: string
        nullable: true
        example: admin
    required:
      - id
      - name
      - email
      - username
      - displayUsername
      - systemRole

  GroupReference:
    type: object
    properties:
      groupId:
        type: string
        format: uuid
      key:
        type: string
        example: tenor
      name:
        type: string
        example: Tenor
      type:
        $ref: '#/schemas/GroupType'
    required:
      - groupId
      - key
      - name
      - type

  GroupMember:
    allOf:
      - $ref: '#/schemas/UserSummary'
      - type: object
        properties:
          joinedAt:
            type: string
            format: date-time
          leftAt:
            type: string
            format: date-time
            nullable: true
        required:
          - joinedAt
          - leftAt

  Group:
    type: object
    properties:
      id:
        type: string
        format: uuid
      key:
        type: string
        example: choir-board
      name:
        type: string
        example: Board
      type:
        $ref: '#/schemas/GroupType'
      description:
        type: string
        nullable: true
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      members:
        type: array
        items:
          $ref: '#/schemas/GroupMember'
      parents:
        type: array
        items:
          $ref: '#/schemas/GroupReference'
      children:
        type: array
        items:
          $ref: '#/schemas/GroupReference'
    required:
      - id
      - key
      - name
      - type
      - description
      - createdAt
      - updatedAt
      - members
      - parents
      - children

  CreateGroupInput:
    type: object
    properties:
      key:
        type: string
      name:
        type: string
      type:
        $ref: '#/schemas/GroupType'
      description:
        type: string
    required:
      - key
      - name
      - type

  UpdateGroupInput:
    type: object
    properties:
      key:
        type: string
      name:
        type: string
      type:
        $ref: '#/schemas/GroupType'
      description:
        type: string

  AddUserToGroupInput:
    type: object
    properties:
      userId:
        type: string
    required:
      - userId

  AddChildGroupInput:
    type: object
    properties:
      childGroupId:
        type: string
        format: uuid
    required:
      - childGroupId

  RoleReference:
    type: object
    properties:
      roleId:
        type: string
        format: uuid
      key:
        type: string
        example: rehearsal-admin
      name:
        type: string
        example: Rehearsal Admin
      description:
        type: string
        nullable: true
    required:
      - roleId
      - key
      - name
      - description

  PermissionReference:
    type: object
    properties:
      permissionId:
        type: string
        format: uuid
      key:
        type: string
        example: events.update
      resource:
        type: string
        example: events
      action:
        type: string
        example: update
      description:
        type: string
        nullable: true
    required:
      - permissionId
      - key
      - resource
      - action
      - description

  RoleUserAssignment:
    allOf:
      - $ref: '#/schemas/UserSummary'
      - type: object
        properties:
          grantedAt:
            type: string
            format: date-time
          expiresAt:
            type: string
            format: date-time
            nullable: true
        required:
          - grantedAt
          - expiresAt

  Role:
    type: object
    properties:
      id:
        type: string
        format: uuid
      key:
        type: string
      name:
        type: string
      description:
        type: string
        nullable: true
      createdAt:
        type: string
        format: date-time
      updatedAt:
        type: string
        format: date-time
      users:
        type: array
        items:
          $ref: '#/schemas/RoleUserAssignment'
      permissions:
        type: array
        items:
          $ref: '#/schemas/PermissionReference'
    required:
      - id
      - key
      - name
      - description
      - createdAt
      - updatedAt
      - users
      - permissions

  CreateRoleInput:
    type: object
    properties:
      key:
        type: string
      name:
        type: string
      description:
        type: string
    required:
      - key
      - name

  UpdateRoleInput:
    type: object
    properties:
      key:
        type: string
      name:
        type: string
      description:
        type: string

  AssignUserToRoleInput:
    type: object
    properties:
      userId:
        type: string
      expiresAt:
        type: string
        format: date-time
    required:
      - userId

  AddPermissionToRoleInput:
    type: object
    properties:
      permissionId:
        type: string
        format: uuid
    required:
      - permissionId

  PermissionUserGrant:
    allOf:
      - $ref: '#/schemas/UserSummary'
      - type: object
        properties:
          effect:
            $ref: '#/schemas/PermissionEffect'
          grantedAt:
            type: string
            format: date-time
          expiresAt:
            type: string
            format: date-time
            nullable: true
          reason:
            type: string
            nullable: true
        required:
          - effect
          - grantedAt
          - expiresAt
          - reason

  Permission:
    type: object
    properties:
      id:
        type: string
        format: uuid
      key:
        type: string
      resource:
        type: string
      action:
        type: string
      description:
        type: string
        nullable: true
      roles:
        type: array
        items:
          $ref: '#/schemas/RoleReference'
      users:
        type: array
        items:
          $ref: '#/schemas/PermissionUserGrant'
    required:
      - id
      - key
      - resource
      - action
      - description
      - roles
      - users

  CreatePermissionInput:
    type: object
    properties:
      key:
        type: string
      resource:
        type: string
      action:
        type: string
      description:
        type: string
    required:
      - key
      - resource
      - action

  UpdatePermissionInput:
    type: object
    properties:
      key:
        type: string
      resource:
        type: string
      action:
        type: string
      description:
        type: string

  GrantUserPermissionInput:
    type: object
    properties:
      userId:
        type: string
      effect:
        $ref: '#/schemas/PermissionEffect'
      expiresAt:
        type: string
        format: date-time
      reason:
        type: string
    required:
      - userId
      - effect

  AdminUserGroupMembership:
    allOf:
      - $ref: '#/schemas/GroupReference'
      - type: object
        properties:
          joinedAt:
            type: string
            format: date-time
          leftAt:
            type: string
            format: date-time
            nullable: true
        required:
          - joinedAt
          - leftAt

  AdminUserRoleAssignment:
    allOf:
      - $ref: '#/schemas/RoleReference'
      - type: object
        properties:
          grantedAt:
            type: string
            format: date-time
          expiresAt:
            type: string
            format: date-time
            nullable: true
        required:
          - grantedAt
          - expiresAt

  AdminUserPermissionGrant:
    allOf:
      - $ref: '#/schemas/PermissionReference'
      - type: object
        properties:
          effect:
            $ref: '#/schemas/PermissionEffect'
          grantedAt:
            type: string
            format: date-time
          expiresAt:
            type: string
            format: date-time
            nullable: true
          reason:
            type: string
            nullable: true
        required:
          - effect
          - grantedAt
          - expiresAt
          - reason

  AdminUser:
    allOf:
      - $ref: '#/schemas/UserSummary'
      - type: object
        properties:
          groups:
            type: array
            items:
              $ref: '#/schemas/AdminUserGroupMembership'
          roles:
            type: array
            items:
              $ref: '#/schemas/AdminUserRoleAssignment'
          permissions:
            type: array
            items:
              $ref: '#/schemas/AdminUserPermissionGrant'
        required:
          - groups
          - roles
          - permissions

  CSKVoice:
    type: string
    enum: [S, A, T, B, S1, S2, A1, A2, T1, T2, B1, B2]
    example: B1

  SongKnowledgeLevel:
    type: string
    enum: [PARTY, GIG, UTANTILL]
    example: UTANTILL

  SongKnowledge:
    type: object
    properties:
      voice:
        $ref: '#/schemas/CSKVoice'
      level:
        $ref: '#/schemas/SongKnowledgeLevel'
    required:
      - voice
      - level

  KnownSong:
    allOf:
      - $ref: '#/schemas/SongKnowledge'
      - type: object
        properties:
          song:
            $ref: '#/schemas/Song'
        required:
          - song

  CreateBookInput:
    type: object
    properties:
      title:
        type: string
        example: Utantill
    required:
      - title

  CreateSongInput:
    type: object
    properties:
      title:
        type: string
        example: Island
      startingTones:
        type: string
        example: A3
    required:
      - title

  BookSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
        example: Utantill
      createdAt:
        type: string
        format: date-time
        example: 2023-01-01T12:00:00Z
      updatedAt:
        type: string
        format: date-time
        example: 2023-01-02T12:00:00Z
    required:
      - id
      - title
      - createdAt
      - updatedAt

  Book:
    allOf:
      - $ref: '#/schemas/BookSummary'
      - type: object
        properties:
          bookSongs:
            type: array
            items:
              $ref: '#/schemas/BookSong'
        required:
          - bookSongs

  BookSong:
    type: object
    properties:
      songId:
        type: string
        format: uuid
      song:
        type: object
        properties:
          title:
            type: string
            example: Island
      pageStart:
        type: integer
        example: 50
      pageEnd:
        type: integer
        example: 55
    required:
      - songId
      - song

  Song:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
        example: Island
      startingTones:
        type: string
        example: A3
      tags:
        type: array
        items:
          $ref: '#/schemas/Tag'
    required:
      - id
      - title

  CSKEventType:
    type: string
    enum: [REHEARSAL, CONCERT, GIG, PARTY, MEETING, OTHER]
    example: REHEARSAL

  CSKEventSummary:
    type: object
    properties:
      name:
        type: string
        example: Rep KK
      type:
        $ref: '#/schemas/CSKEventType'
      description:
        type: string
        example: Annual Christmas concert
      dateStart:
        type: string
        format: date-time
        example: 2023-12-24T18:00:00Z
      dateEnd:
        type: string
        format: date-time
        example: 2023-12-24T21:00:00Z
      place:
        type: string
        example: St. Paul's Church
      requiresAttendance:
        type: boolean
        example: true
      requiresRegistration:
        type: boolean
        example: false
    required:
      - name
      - type
      - dateStart
      - place
      - requiresAttendance
      - requiresRegistration

  CSKEvent:
    allOf:
      - $ref: '#/schemas/CSKEventSummary'
      - type: object
        properties:
          id:
            type: string
            format: uuid
          attendees:
            type: array
            items:
              $ref: '#/schemas/Attendance'
          registrations:
            type: array
            items:
              $ref: '#/schemas/Registration'
        required:
          - id

  CreateEventInput:
    $ref: '#/schemas/CSKEventSummary'

  AttendanceStatus:
    type: string
    enum: [PRESENT, ABSENT]
    example: PRESENT

  UpdateAttendanceInput:
    type: object
    properties:
      status:
        $ref: '#/schemas/AttendanceStatus'
      userId:
        type: string
    required:
      - userId

  Attendance:
    type: object
    properties:
      userId:
        type: string
      firstName:
        type: string
        example: Liam
      lastName:
        type: string
        example: Cotton
      status:
        $ref: '#/schemas/AttendanceStatus'
    required:
      - userId
      - firstName
      - lastName

  MakeRegistrationInput:
    type: object
    properties:
      userId:
        type: string
      comments:
        type: string
        example: Looking forward to it!
      dietaryRestrictions:
        type: string
        example: Vegetarian
    required:
      - userId

  Registration:
    type: object
    properties:
      userId:
        type: string
      name:
        type: string
        example: Liam Cotton
      comments:
        type: string
        example: Looking forward to it!
      dietaryRestrictions:
        type: string
        example: Vegetarian
    required:
      - userId
      - name

  Tag:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        example: Lucia
    required:
      - id
      - name

  Error:
    type: object
    properties:
      message:
        type: string
      code:
        type: string
    required:
      - message

requestBodies:
  CreateEvent:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/schemas/CreateEventInput'

  UpdateAttendance:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/schemas/UpdateAttendanceInput'

  MakeRegistration:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/schemas/MakeRegistrationInput'

responses:
  ErrorResponse:
    description: Unexpected error
    content:
      application/json:
        schema:
          $ref: '#/schemas/Error'

securitySchemes:
  authCookie:
    type: apiKey
    description: Authentication via JWT stored in a cookie
    in: cookie
    name: better-auth.session_token
