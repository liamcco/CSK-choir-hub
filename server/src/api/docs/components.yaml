schemas:
  CSKVoice:
    type: string
    enum: [S, A, T, B, S1, S2, A1, A2, T1, T2, B1, B2]
    example: B1

  SongKnowledgeLevel:
    type: string
    enum: [PARTY, GIG, UTANTILL]
    example: UTANTILL

  SongKnowledge:
    type: object
    properties:
      voice:
        $ref: '#/schemas/CSKVoice'
      level:
        $ref: '#/schemas/SongKnowledgeLevel'
    required:
      - voice
      - level

  KnownSong:
    allOf:
      - $ref: '#/schemas/SongKnowledge'
      - type: object
        properties:
          song:
            $ref: '#/schemas/Song'
        required:
          - song

  RoleSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        example: ADMIN
      description:
        type: string
        example: Administrator with full access
    required: [id, name]
  Role:
    allOf:
      - $ref: '#/schemas/RoleSummary'
      - type: object
        properties:
        groups:
          type: array
          items:
            type: string
            format: uuid
        user:
          type: object
          nullable: true
          properties:
            userId:
              type: string
              format: uuid
            name:
              type: string
              example: Liam Cotton
          required:
            - userId
            - name
        required:
          - groups
          - user

  GroupType:
    type: string
    enum: [VOICE, CHOIR, COMMITTEE, OTHER, CONDUCTORS, BOARD]
    example: VOICE

  GroupSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        example: Tenor
      type:
        $ref: '#/schemas/GroupType'
    required: [id, name, type]
  Group:
    allOf:
      - $ref: '#/schemas/GroupSummary'
      - type: object
        properties:
          description:
            type: string
          members:
            type: array
            items:
              type: string
              format: uuid
          roles:
            type: array
            items:
              type: string
              format: uuid
          parents:
            type: array
            items:
              type: string
              format: uuid
          children:
            type: array
            items:
              type: string
              format: uuid

        required:
          - members
          - roles
          - parents
          - children

  CreateBookInput:
    type: object
    properties:
      title:
        type: string
        example: Utantill
    required:
      - title

  BookSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
        example: Utantill
      createdAt:
        type: string
        format: date-time
        example: 2023-01-01T12:00:00Z
      updatedAt:
        type: string
        format: date-time
        example: 2023-01-02T12:00:00Z
    required:
      - id
      - title
      - createdAt
      - updatedAt
  Book:
    allOf:
      - $ref: '#/schemas/BookSummary'
      - type: object
        properties:
          bookSongs:
            type: array
            items:
              $ref: '#/schemas/BookSong'
        required:
          - bookSongs

  BookSong:
    type: object
    properties:
      songId:
        type: string
        format: uuid
      pageStart:
        type: integer
        example: 50
      pageEnd:
        type: integer
        example: 55
    required:
      - songId

  Song:
    type: object
    properties:
      id:
        type: string
        format: uuid
      title:
        type: string
        example: Island
      startingTones:
        type: string
        example: A3
      tags:
        type: array
        items:
          type: string
          format: uuid
    required:
      - id
      - title

  CSKEventType:
    type: string
    enum: [REHEARSAL, CONCERT, GIG, PARTY, MEETING, OTHER]
    example: REHEARSAL

  CSKEventSummary:
    type: object
    properties:
      name:
        type: string
        example: Rep KK
      type:
        $ref: '#/schemas/CSKEventType'
      description:
        type: string
        example: Annual Christmas concert
      dateStart:
        type: string
        format: date-time
        example: 2023-12-24T18:00:00Z
      dateEnd:
        type: string
        format: date-time
        example: 2023-12-24T21:00:00Z
      place:
        type: string
        example: St. Paul's Church
      requiresAttendance:
        type: boolean
        example: true
      requiresRegistration:
        type: boolean
        example: false
    required:
      - name
      - type
      - dateStart
      - place
      - requiresAttendance
      - requiresRegistration
  CSKEvent:
    allOf:
      - $ref: '#/schemas/CSKEventSummary'
      - type: object
        properties:
          id:
            type: string
            format: uuid
          attendees:
            type: array
            items:
              $ref: '#/schemas/Attendance'
          registrations:
            type: array
            items:
              $ref: '#/schemas/Registration'
        required:
          - id

  CreateEventInput:
    $ref: '#/schemas/CSKEventSummary'

  AttendanceStatus:
    type: string
    enum: [PRESENT, ABSENT]
    example: PRESENT

  UpdateAttendanceInput:
    type: object
    properties:
      status:
        $ref: '#/schemas/AttendanceStatus'
      userId:
        type: integer
        format: int64
    required:
      - userId

  Attendance:
    type: object
    properties:
      userId:
        type: string
        format: uuid
      firstName:
        type: string
        example: Liam
      lastName:
        type: string
        example: Cotton
      status:
        $ref: '#/schemas/AttendanceStatus'
    required:
      - userId
      - firstName
      - lastName

  MakeRegistrationInput:
    type: object
    properties:
      userId:
        type: string
        format: uuid
      comments:
        type: string
        example: Looking forward to it!
      dietaryRestrictions:
        type: string
        example: Vegetarian
    required:
      - userId

  Registration:
    type: object
    properties:
      userId:
        type: string
        format: uuid
      name:
        type: string
        example: Liam Cotton
      comments:
        type: string
        example: Looking forward to it!
      dietaryRestrictions:
        type: string
        example: Vegetarian
    required:
      - userId
      - name

  Tag:
    type: object
    properties:
      tagId:
        type: string
        format: uuid
      name:
        type: string
        example: Lucia
    required:
      - tagId
      - name

  Error:
    type: object
    properties:
      message:
        type: string
      code:
        type: string
    required:
      - message

requestBodies:
  CreateEvent:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/schemas/CreateEventInput'

  UpdateAttendance:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/schemas/UpdateAttendanceInput'

  MakeRegistration:
    required: true
    content:
      application/json:
        schema:
          $ref: '#/schemas/MakeRegistrationInput'

responses:
  ErrorResponse:
    description: Unexpected error
    content:
      application/json:
        schema:
          $ref: '#/schemas/Error'

securitySchemes:
  authCookie:
    type: apiKey
    description: Authentication via JWT stored in a cookie
    in: cookie
    name: better-auth.session-token
